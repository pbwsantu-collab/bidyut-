<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Library - Bidyut</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .videos-hero {
            background: linear-gradient(135deg, #1a1a2e, #0f3460);
            color: #fff;
            padding: 60px 20px;
            text-align: center;
        }
        .videos-hero h1 { font-size: 40px; }
        .videos-hero p { color: #ccc; font-size: 18px; }

        .video-grid {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .video-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: all 0.3s;
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .video-card .thumbnail {
            width: 100%;
            height: 180px;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #fff;
        }

        .video-card .info {
            padding: 20px;
        }

        .video-card .info .subject {
            color: #e94560;
            font-weight: bold;
            font-size: 14px;
        }

        .video-card .info h3 {
            margin: 10px 0;
            color: #1a1a2e;
        }

        .video-card .info .chapter {
            color: #666;
            font-size: 14px;
        }

        .video-card .info .watch-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 25px;
            background: #e94560;
            color: #fff;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
        }

        .video-card .info .watch-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.3);
        }

        @media (max-width: 480px) {
            .videos-hero h1 { font-size: 28px; }
            .video-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
